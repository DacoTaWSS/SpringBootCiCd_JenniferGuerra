name: CD - Deploy to Render

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check CI conclusion
        run: |
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion }}"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI failed, aborting deploy"
            exit 1
          fi

      - name: Trigger Render Deploy Hook
        id: deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}&APP_VERSION=${{ github.run_number }}-${{ github.sha }}")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy failed with status $HTTP_STATUS"
            exit 1
          fi

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ failure() }}
    steps:
      - name: Get last successful deploy ID
        id: get_deploy
        run: |
          DEPLOY_ID=$(curl -s --request GET \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=20" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Accept: application/json" \
            | jq -r '[.[] | select(.deploy.status == "live")] | .[1].deploy.id')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Last successful deploy ID: $DEPLOY_ID"

      - name: Rollback to last successful deploy
        run: |
          curl --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/${{ steps.get_deploy.outputs.deploy_id }}/rollback" \
            --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --header "Accept: application/json"
          echo "Rollback triggered to deploy ${{ steps.get_deploy.outputs.deploy_id }}"