spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: never

logging:
  level:
    root: warn

jwt:
  secret: MiClaveSecretaSuperSeguraParaJWTqueDebeSerLargaAlMenos256Bits!!
  expiration-ms: 3600000

app:
  version: ${APP_VERSION:local}